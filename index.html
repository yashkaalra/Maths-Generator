<script>
// ─── Utilities ────────────────────────────────────────────────────────────────
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function gcd(a,b){return b?gcd(b,a%b):a}
function lcm(a,b){return a*b/gcd(a,b)}
function ff(n,d){let g=gcd(Math.abs(n),Math.abs(d));if(d<0){n=-n;d=-d}return `${n/g}/${d/g}`}
function mixed(w,n,d){return `${w} ${n}/${d}`}
function name(){return pick(['Ravi','Priya','Amit','Sita','Kiran','Mohan','Deepa','Arjun','Nisha','Vijay','Anita','Suresh'])}
function primeFactors(n){let f=[];for(let i=2;i*i<=n;i++){while(n%i===0){f.push(i);n/=i}}if(n>1)f.push(n);return f}
function isPrime(n){if(n<2)return false;for(let i=2;i*i<=n;i++)if(n%i===0)return false;return true}

// ─── State ────────────────────────────────────────────────────────────────────
let currentCurriculum = 'icse8';
let generatedPapers = [];
let activePaperIndex = 0;
let showAnswers = false;

// ─── Chapter Lists ────────────────────────────────────────────────────────────
const CHAPTERS_ICSE8 = [
  'Rational Numbers','Exponents','Squares and Square Roots','Cubes and Cube Roots',
  'Algebraic Expressions and Identities','Factorisation','Linear Equations',
  'Direct and Inverse Variation','Percentage and its Applications',
  'Mensuration','Data Handling','Graphs'
];
const CHAPTERS_CBSE9 = [
  'Number Systems','Polynomials','Coordinate Geometry',
  'Linear Equations in Two Variables','Introduction to Euclid Geometry',
  'Lines and Angles','Triangles','Quadrilaterals',
  'Areas of Parallelograms and Triangles','Circles',
  'Herons Formula','Surface Areas and Volumes','Statistics','Probability'
];
function getCurrentChapters(){return currentCurriculum==='cbse9'?CHAPTERS_CBSE9:CHAPTERS_ICSE8}

// ═══════════════════════════════════════════════════════════════════════════════
// ICSE CLASS 8 GENERATORS
// ═══════════════════════════════════════════════════════════════════════════════
const G_ICSE8 = {};

G_ICSE8['Rational Numbers']={
  easy:[
    ()=>{const n=rng(1,9),d=rng(2,10);return{topic:'Simplify rational number',text:`Simplify the rational number ${ff(n*2,d*2)}.`,answer:`${ff(n,d)}`}},
    ()=>{const a=rng(1,5),b=rng(2,8),c=rng(1,5),d=rng(2,8);return{topic:'Add rational numbers',text:`Add ${ff(a,b)} + ${ff(c,d)}.`,answer:`${ff(a*d+c*b,b*d)}`}},
    ()=>{const a=rng(1,9),b=rng(2,10);return{topic:'Additive inverse',text:`Find the additive inverse of ${ff(a,b)}.`,answer:`${ff(-a,b)}`}},
    ()=>{const a=rng(1,9),b=rng(2,10);return{topic:'Multiplicative inverse',text:`Find the multiplicative inverse (reciprocal) of ${ff(a,b)}.`,answer:`${ff(b,a)}`}},
    ()=>{const a=rng(-9,-1),b=rng(2,10);return{topic:'Represent on number line',text:`Represent ${ff(a,b)} on the number line. Between which two integers does it lie?`,answer:`Between ${Math.ceil(a/b)-1} and ${Math.ceil(a/b)}`}},
    ()=>{const n=rng(1,5),d=rng(2,6);return{topic:'Compare rational numbers',text:`Which is greater: ${ff(n,d)} or ${ff(n+1,d)}?`,answer:`${ff(n+1,d)} is greater`}},
    ()=>{const a=rng(1,8),b=rng(2,9);return{topic:'Subtract rational numbers',text:`Subtract ${ff(a,b)} from 1.`,answer:`${ff(b-a,b)}`}},
    ()=>{const a=rng(2,8),b=rng(2,8);return{topic:'Multiply rational numbers',text:`Multiply ${ff(a,b)} × ${ff(b,a)}.`,answer:`1`}},
    ()=>{const a=rng(1,5),b=rng(2,7);return{topic:'Divide rational numbers',text:`Divide ${ff(a,b)} ÷ ${ff(a,b)}.`,answer:`1`}},
    ()=>{const a=rng(1,9);return{topic:'Rational between integers',text:`Write any two rational numbers between ${a} and ${a+1}.`,answer:`e.g. ${ff(2*a+1,2)} and ${ff(4*a+3,4)}`}},
  ],
  moderate:[
    ()=>{const a=rng(1,5),b=rng(3,8),c=rng(1,5),d=rng(3,8),e=rng(1,4),f=rng(3,7);return{topic:'Add three rationals',text:`Simplify: ${ff(a,b)} + ${ff(c,d)} − ${ff(e,f)}.`,answer:`Compute by taking LCM of ${b},${d},${f}`}},
    ()=>{const a=rng(2,6),b=rng(3,9),c=rng(2,6),d=rng(3,9);return{topic:'Multiply and simplify',text:`Simplify: ${ff(a,b)} × ${ff(c,d)} × ${ff(b,a)}.`,answer:`${ff(c,d)}`}},
    ()=>{const n=rng(1,4);return{topic:'Rational numbers between two rationals',text:`Find three rational numbers between ${ff(1,n+1)} and ${ff(1,n)}.`,answer:`Multiply numerator and denominator to get equivalent fractions and pick values in between`}},
    ()=>{const a=rng(2,7),b=rng(3,9);return{topic:'Distributive property',text:`Verify distributive property: ${ff(a,b)} × (${ff(1,2)} + ${ff(1,3)}).`,answer:`${ff(a,b)} × ${ff(5,6)} = ${ff(5*a,6*b)}`}},
    ()=>{const a=rng(1,5),b=rng(2,8),c=rng(1,5),d=rng(2,8);return{topic:'Word problem – sharing',text:`${name()} has ${ff(a,b)} of a pizza and gives ${ff(c,d)} to a friend. How much is left?`,answer:`${ff(a*d-c*b,b*d)}`}},
    ()=>{const a=rng(2,6),b=rng(3,8);return{topic:'Closure property',text:`Show that rational numbers are closed under addition using ${ff(a,b)} and ${ff(b-1,b)}.`,answer:`${ff(a,b)} + ${ff(b-1,b)} = ${ff(a+b-1,b)}, which is also a rational number`}},
    ()=>{const a=rng(1,5),b=rng(2,7);return{topic:'Arrange in ascending order',text:`Arrange in ascending order: ${ff(a,b)}, ${ff(a+1,b)}, ${ff(a-1,b)}, ${ff(a,b+1)}.`,answer:`Compare by converting to same denominator`}},
    ()=>{const x=rng(2,8);return{topic:'Find rational number',text:`Find a rational number exactly midway between ${ff(1,x)} and ${ff(1,x-1)}.`,answer:`${ff(2*x-1,2*x*(x-1))}`}},
  ],
  hard:[
    ()=>{const a=rng(2,5),b=rng(3,7);return{topic:'Properties proof',text:`Using properties of rational numbers, show that ${ff(a,b)} × (${ff(b,a)} + ${ff(-1,a)}) = 1 − ${ff(1,b)}.`,answer:`Expand: ${ff(a,b)}×${ff(b,a)} + ${ff(a,b)}×${ff(-1,a)} = 1 − ${ff(1,b)}`}},
    ()=>{return{topic:'Insert rational numbers',text:`Insert 5 rational numbers between −1/2 and 1/2.`,answer:`−2/5, −1/5, 0, 1/5, 2/5 (multiply numerator and denominator by 6)`}},
    ()=>{const a=rng(2,5),b=rng(3,8);return{topic:'Complex expression',text:`Simplify: [${ff(a,b)} ÷ ${ff(a,b+1)}] × [${ff(b+1,b)} − 1].`,answer:`= ${ff(b+1,b)} × ${ff(1,b)} = ${ff(b+1,b*b)}`}},
    ()=>{return{topic:'Word problem – multi-step',text:`A tank is ${ff(3,4)} full. After removing ${ff(1,6)} of its capacity, what fraction remains? If the tank holds 240 L, find the actual amount remaining.`,answer:`${ff(3,4)} − ${ff(1,6)} = ${ff(7,12)}; Amount = ${ff(7,12)} × 240 = 140 L`}},
    ()=>{return{topic:'Rational number property',text:`Prove that between any two rational numbers there are infinitely many rational numbers.`,answer:`For any two rationals p/q and r/s, their average (ps+qr)/(2qs) is a rational between them; this process can be repeated infinitely.`}},
  ]
};

G_ICSE8['Exponents']={
  easy:[
    ()=>{const b=rng(2,5),e=rng(2,4);return{topic:'Evaluate power',text:`Evaluate: ${b}^${e}.`,answer:`${Math.pow(b,e)}`}},
    ()=>{const b=rng(2,5),e=rng(2,4);return{topic:'Negative exponent',text:`Express ${b}^(−${e}) as a fraction.`,answer:`1/${Math.pow(b,e)}`}},
    ()=>{const b=rng(2,4),p=rng(2,3),q=rng(2,3);return{topic:'Product of powers',text:`Simplify: ${b}^${p} × ${b}^${q}.`,answer:`${b}^${p+q} = ${Math.pow(b,p+q)}`}},
    ()=>{const b=rng(2,4),p=rng(3,5),q=rng(1,2);return{topic:'Quotient of powers',text:`Simplify: ${b}^${p} ÷ ${b}^${q}.`,answer:`${b}^${p-q} = ${Math.pow(b,p-q)}`}},
    ()=>{const b=rng(2,4),p=rng(2,3),q=rng(2,3);return{topic:'Power of a power',text:`Simplify: (${b}^${p})^${q}.`,answer:`${b}^${p*q} = ${Math.pow(b,p*q)}`}},
    ()=>{const b=rng(2,9);return{topic:'Zero exponent',text:`Find the value of ${b}^0.`,answer:`1`}},
    ()=>{const b=rng(2,5),p=rng(2,3);return{topic:'Express in standard form',text:`Express ${Math.pow(b,p)} as a power of ${b}.`,answer:`${b}^${p}`}},
    ()=>{const a=rng(2,4),b=rng(2,4),e=rng(2,3);return{topic:'Power of product',text:`Simplify: (${a} × ${b})^${e}.`,answer:`${a}^${e} × ${b}^${e} = ${Math.pow(a,e)*Math.pow(b,e)}`}},
    ()=>{const b=rng(2,5),e=rng(2,3);return{topic:'Express as fraction',text:`Write (1/${b})^${e} as a power of ${b} with a negative exponent.`,answer:`${b}^(−${e})`}},
    ()=>{const n=rng(1000,99999);return{topic:'Scientific notation',text:`Express ${n} in scientific notation.`,answer:`${n.toExponential()}`}},
  ],
  moderate:[
    ()=>{const a=rng(2,3),b=rng(2,3),p=rng(2,3),q=rng(2,3);return{topic:'Laws of exponents',text:`Simplify: (${a}^${p} × ${b}^${p}) ÷ (${a}^${q} × ${b}^${q}).`,answer:`(${a}×${b})^${p-q} = ${Math.pow(a*b,p-q)}`}},
    ()=>{const p=rng(2,4),q=rng(1,3);return{topic:'Exponent equation',text:`If 2^x = ${Math.pow(2,p)}, find x.`,answer:`x = ${p}`}},
    ()=>{return{topic:'Compare powers',text:`Which is greater: 2^10 or 10^3? Justify.`,answer:`2^10 = 1024, 10^3 = 1000; so 2^10 is greater`}},
    ()=>{const a=rng(2,4),b=rng(2,3),c=rng(2,3);return{topic:'Multi-step simplification',text:`Simplify: (${a}^${b})^${c} ÷ ${a}^${b*c-1}.`,answer:`${a}^1 = ${a}`}},
    ()=>{const n=pick([0.0001,0.00023,0.00456]);return{topic:'Scientific notation – small',text:`Express ${n} in scientific notation.`,answer:`${n.toExponential()}`}},
    ()=>{return{topic:'Laws – negative exponents',text:`Simplify: 3^(−2) × 3^5 ÷ 3^(−1).`,answer:`3^(−2+5+1) = 3^4 = 81`}},
    ()=>{const a=rng(2,4),p=rng(2,4);return{topic:'Power of a quotient',text:`Simplify: (${a}/2)^${p}.`,answer:`${Math.pow(a,p)}/${Math.pow(2,p)}`}},
    ()=>{return{topic:'Word problem – bacteria',text:`A bacteria doubles every hour. Starting with 1 bacterium, how many will there be after 8 hours?`,answer:`2^8 = 256 bacteria`}},
  ],
  hard:[
    ()=>{return{topic:'Proof using laws',text:`Show that (a^m)^n = a^(mn) using repeated multiplication.`,answer:`(a^m)^n = a^m × a^m × … (n times) = a^(m+m+…n times) = a^(mn)`}},
    ()=>{return{topic:'Complex simplification',text:`Simplify: [2^(n+1) × 2^(n−1)] / [2^(2n) − 2^(2n−2)].`,answer:`= 2^(2n) / [2^(2n)(1 − 1/4)] = 1/(3/4) = 4/3`}},
    ()=>{const x=rng(2,4);return{topic:'Exponent equations',text:`If (${x})^(2x−1) = (${x})^(x+2), find x.`,answer:`2x−1 = x+2 ⟹ x = 3`}},
    ()=>{return{topic:'Application – distance',text:`The distance from Earth to Sun is approximately 1.5 × 10^8 km. Light travels at 3 × 10^5 km/s. How many seconds does light take to reach Earth from Sun?`,answer:`Time = (1.5×10^8)/(3×10^5) = 500 seconds`}},
    ()=>{return{topic:'Challenging simplification',text:`Simplify: (x^a/x^b)^(a+b) × (x^b/x^c)^(b+c) × (x^c/x^a)^(c+a).`,answer:`= x^((a−b)(a+b)) × x^((b−c)(b+c)) × x^((c−a)(c+a)) = x^(a²−b²+b²−c²+c²−a²) = x^0 = 1`}},
  ]
};

G_ICSE8['Squares and Square Roots']={
  easy:[
    ()=>{const n=rng(2,12);return{topic:'Perfect square',text:`Find the square of ${n}.`,answer:`${n*n}`}},
    ()=>{const n=pick([4,9,16,25,36,49,64,81,100,121,144]);return{topic:'Square root',text:`Find √${n}.`,answer:`${Math.sqrt(n)}`}},
    ()=>{const n=rng(2,9);return{topic:'Is it a perfect square?',text:`Is ${n*n+1} a perfect square? Justify.`,answer:`No, because √${n*n+1} is not a whole number`}},
    ()=>{const n=rng(10,20);return{topic:'Square using identity',text:`Find (${n})² using the identity (a+b)² = a²+2ab+b².`,answer:`(${Math.floor(n/10)*10}+${n%10})² = ${Math.floor(n/10)*10*Math.floor(n/10)*10}+${2*Math.floor(n/10)*10*(n%10)}+${(n%10)*(n%10)} = ${n*n}`}},
    ()=>{const n=rng(1,9);return{topic:'Pythagorean triplet',text:`Check if (${n*2+1}, ${2*n*(n+1)}, ${2*n*n+2*n+1}) is a Pythagorean triplet.`,answer:`(${n*2+1})²+(${2*n*(n+1)})² = ${(n*2+1)**2+(2*n*(n+1))**2} = (${2*n*n+2*n+1})² = ${(2*n*n+2*n+1)**2}. Yes!`}},
    ()=>{const n=pick([1,4,9,16,25]);return{topic:'Pattern',text:`Without actual multiplication, find (${Math.sqrt(n)+1})² − (${Math.sqrt(n)})².`,answer:`${2*Math.sqrt(n)+1}`}},
    ()=>{const n=rng(2,8);return{topic:'Odd number sum',text:`Express ${n*n} as sum of consecutive odd numbers.`,answer:`1+3+5+…+(${2*n-1}) = ${n*n}`}},
    ()=>{return{topic:'Units digit',text:`What is the units digit of (47)²?`,answer:`7² = 49, so units digit is 9`}},
    ()=>{const n=rng(3,9);return{topic:'Estimate square root',text:`Between which two consecutive integers does √${n*n+rng(1,2*n-1)} lie?`,answer:`Between ${n} and ${n+1}`}},
    ()=>{const n=rng(2,5)*2;return{topic:'Square root by prime factorisation',text:`Find √${n*n} by prime factorisation.`,answer:`${n*n} = ${primeFactors(n*n).join(' × ')}; √${n*n} = ${n}`}},
  ],
  moderate:[
    ()=>{const n=rng(100,400);return{topic:'Square root by long division',text:`Find √${n*n} by the long division method.`,answer:`√${n*n} = ${n}`}},
    ()=>{const n=rng(2,9),m=rng(2,9);return{topic:'Simplify expression',text:`Simplify: √${n*n*m*m}.`,answer:`${n*m}`}},
    ()=>{const a=rng(2,5),b=rng(2,5);return{topic:'Area of square',text:`The area of a square is ${a*a*b*b} cm². Find its perimeter.`,answer:`Side = ${a*b} cm, Perimeter = ${4*a*b} cm`}},
    ()=>{const n=rng(2,6);return{topic:'Smallest multiplier for perfect square',text:`Find the smallest number by which ${n*n*pick([2,3,5,7])} must be multiplied to get a perfect square.`,answer:`Prime factorise and find the unpaired factor`}},
    ()=>{const n=rng(10,25);return{topic:'Square root estimation',text:`Find √${n} correct to one decimal place.`,answer:`${Math.sqrt(n).toFixed(1)}`}},

// ═══════════════════════════════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
function getGeneratorSet(){return currentCurriculum==='cbse9'?G_CBSE9:G_ICSE8}

function buildPool(chapters){
  const pool=[];
  const GG=getGeneratorSet();
  chapters.forEach(ch=>{
    const g=GG[ch];if(!g)return;
    const levels=[['easy',1],['moderate',2],['hard',3]];
    levels.forEach(([level,marks])=>{
      if(!g[level])return;
      const used=new Set();
      g[level].forEach((fn,i)=>{
        try{
          const q=fn();
          if(q&&q.text&&!used.has(q.text)){used.add(q.text);pool.push({chapter:ch,level,marks,topic:q.topic,text:q.text,answer:q.answer});}
        }catch(e){}
      });
    });
  });
  return pool;
}

function pickBalanced(pool,count,marks){
  const byChapter={};
  pool.filter(q=>q.marks===marks).forEach(q=>{(byChapter[q.chapter]=byChapter[q.chapter]||[]).push(q);});
  const chapters=Object.keys(byChapter);if(!chapters.length)return[];
  const result=[];let ci=0;
  while(result.length<count&&chapters.some(c=>byChapter[c].length>0)){
    const ch=chapters[ci%chapters.length];ci++;
    if(!byChapter[ch]||!byChapter[ch].length)continue;
    const idx=Math.floor(Math.random()*byChapter[ch].length);
    result.push(byChapter[ch].splice(idx,1)[0]);
  }
  return result;
}

function buildPaper(chapters){
  const pool=buildPool(chapters);
  const sections=[
    {name:'A',marks:1,count:10,label:'(1 mark each)'},
    {name:'B',marks:1,count:8, label:'(2 marks each)'},
    {name:'C',marks:2,count:7, label:'(3 marks each)'},
    {name:'D',marks:3,count:5, label:'(4 marks each)'},
  ];
  const paper={sections:[]};
  sections.forEach(s=>{
    const qs=pickBalanced(pool,s.count,s.marks);
    paper.sections.push({...s,questions:qs});
  });
  return paper;
}

function renderPaper(paper,idx){
  const isICSE=currentCurriculum==='icse8';
  const classLabel=isICSE?'Class VIII':'Class IX';
  const boardLabel=isICSE?'ICSE':'CBSE';
  const bookLabel=isICSE?'ML Aggarwal':'NCERT';
  let qNum=0;
  let html=`<div class="paper-doc" id="paper-${idx}">
    <div class="doc-header">
      <h2>${boardLabel} Mathematics Examination</h2>
      <h3>${classLabel} · Paper ${idx+1}</h3>
    </div>
    <div class="doc-meta">
      <span>Time: 3 Hours</span>
      <span>Maximum Marks: 80</span>
    </div>
    <p style="font-size:12px;font-style:italic;margin-bottom:10px"><em>General Instructions: Attempt all questions. Show all working. Figures to the right indicate marks.</em></p>`;
  paper.sections.forEach(s=>{
    html+=`<div class="section-head">Section ${s.name} ${s.label}</div>`;
    s.questions.forEach(q=>{qNum++;html+=`<div class="q-row"><span class="q-num">${qNum}.</span><span class="q-text">${q.text}</span></div>`;});
  });
  html+=`<div class="ans-section" id="ans-${idx}" style="display:${showAnswers?'block':'none'}"><h4>Answer Key</h4>`;
  qNum=0;
  paper.sections.forEach(s=>{s.questions.forEach(q=>{qNum++;html+=`<div class="ans-row"><span class="ans-num">${qNum}.</span><span class="ans-text">${q.answer}</span></div>`;});});
  html+=`</div></div>`;
  return html;
}

function generatePapers(){
  const chapters=getSelectedChapters();
  if(!chapters.length){alert('Please select at least one chapter.');return;}
  const n=Math.min(5,Math.max(1,parseInt(document.getElementById('numPapers').value)||1));
  generatedPapers=[];
  for(let i=0;i<n;i++)generatedPapers.push(buildPaper(chapters));
  activePaperIndex=0;showAnswers=false;
  renderAll();
}

function renderAll(){
  const tabs=document.getElementById('paperTabs');
  const area=document.getElementById('paperArea');
  if(!generatedPapers.length){tabs.style.display='none';area.innerHTML='<div class="empty-state"><div class="icon">📄</div><h3>No papers generated yet</h3><p>Select chapters and click Generate Papers</p></div>';['ansBtn','dlBtn','printBtn'].forEach(id=>document.getElementById(id).style.display='none');return;}
  tabs.style.display='block';
  tabs.innerHTML=generatedPapers.map((_,i)=>`<span class="tab${i===activePaperIndex?' active':''}" onclick="switchTab(${i})">Paper ${i+1}</span>`).join('');
  area.innerHTML=renderPaper(generatedPapers[activePaperIndex],activePaperIndex);
  document.getElementById('ansBtn').style.display='inline-block';
  document.getElementById('ansBtn').textContent=showAnswers?'Hide Answers':'Show Answers';
  document.getElementById('dlBtn').style.display='inline-block';
  document.getElementById('printBtn').style.display='inline-block';
}

function switchTab(i){activePaperIndex=i;renderAll();}

function toggleAnswers(){
  showAnswers=!showAnswers;
  document.getElementById('ansBtn').textContent=showAnswers?'Hide Answers':'Show Answers';
  const el=document.getElementById(`ans-${activePaperIndex}`);
  if(el)el.style.display=showAnswers?'block':'none';
}

function switchCurriculum(){
  currentCurriculum=document.getElementById('curriculumSelect').value;
  const isCBSE=currentCurriculum==='cbse9';
  document.getElementById('sidebarSub').textContent=isCBSE?'CBSE Class 9 · NCERT Mathematics':'ICSE Class 8 · ML Aggarwal Mathematics';
  document.getElementById('sidebarFooter').innerHTML=isCBSE?'NCERT Class 9 · Dynamically generated<br/>No two papers are ever the same.':'ML Aggarwal Class 8 · Dynamically generated<br/>No two papers are ever the same.';
  generatedPapers=[];activePaperIndex=0;showAnswers=false;
  buildChapterList();
  document.getElementById('paperTabs').style.display='none';
  document.getElementById('paperArea').innerHTML='<div class="empty-state"><div class="icon">📄</div><h3>No papers generated yet</h3><p>Select chapters and click Generate Papers</p></div>';
  ['ansBtn','dlBtn','printBtn'].forEach(id=>document.getElementById(id).style.display='none');
}

function buildChapterList(){
  const chapters=getCurrentChapters();
  const cl=document.getElementById('chapterList');
  cl.innerHTML=chapters.map((ch,i)=>`<label class="ch-item"><input type="checkbox" id="ch-${i}" value="${ch}" checked/><span>${ch}</span></label>`).join('');
}

function getSelectedChapters(){
  return getCurrentChapters().filter((_,i)=>{const el=document.getElementById(`ch-${i}`);return el&&el.checked;});
}

function selAll(){getCurrentChapters().forEach((_,i)=>{const el=document.getElementById(`ch-${i}`);if(el)el.checked=true;});}
function selNone(){getCurrentChapters().forEach((_,i)=>{const el=document.getElementById(`ch-${i}`);if(el)el.checked=false;});}

function downloadPDF(){
  if(!generatedPapers.length) return;
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  
  const isICSE = currentCurriculum === 'icse8';
  const classLabel = isICSE ? 'Class VIII' : 'Class IX';
  const boardLabel = isICSE ? 'ICSE' : 'CBSE';
  const paper = generatedPapers[activePaperIndex];
  
  let y = 20; 
  const margin = 20;
  const pageWidth = 210;
  const contentWidth = pageWidth - (margin * 2);

  // --- Header ---
  doc.setFont("times", "bold");
  doc.setFontSize(16);
  doc.text(`${boardLabel} MATHEMATICS EXAMINATION`, pageWidth / 2, y, {align: 'center'});
  y += 8;
  
  doc.setFontSize(12);
  doc.text(`${classLabel} · PAPER ${activePaperIndex + 1}`, pageWidth / 2, y, {align: 'center'});
  y += 10;

  // --- Exam Info ---
  doc.setFontSize(10);
  doc.text(`Time: 3 Hours`, margin, y);
  doc.text(`Maximum Marks: 80`, pageWidth - margin, y, {align: 'right'});
  y += 4;
  
  doc.setLineWidth(0.5);
  doc.line(margin, y, pageWidth - margin, y);
  y += 10;

  // --- Questions ---
  let qNum = 0;
  paper.sections.forEach(s => {
    // Page check for section heading
    if (y > 260) { doc.addPage(); y = 20; }
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(`Section ${s.name} ${s.label}`, margin, y);
    y += 8;

    doc.setFont("times", "normal");
    doc.setFontSize(11);

    s.questions.forEach(q => {
      qNum++;
      const qLine = `${qNum}. ${q.text}`;
      const splitQ = doc.splitTextToSize(qLine, contentWidth);
      const qHeight = splitQ.length * 7; // Height based on line count

      // Automatic Page Break
      if (y + qHeight > 280) {
        doc.addPage();
        y = 20;
      }

      doc.text(splitQ, margin, y);
      y += qHeight + 2; 
    });
    y += 6; 
  });

  // --- Answer Key ---
  if(showAnswers){
    doc.addPage();
    y = 20;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text('ANSWER KEY', pageWidth / 2, y, {align: 'center'});
    y += 12;
    
    doc.setFont("times", "normal");
    doc.setFontSize(10);
    let aNum = 0;

    paper.sections.forEach(s => {
      s.questions.forEach(q => {
        aNum++;
        const aLine = `${aNum}. ${q.answer}`;
        const splitA = doc.splitTextToSize(aLine, contentWidth);
        const aHeight = splitA.length * 5;

        if (y + aHeight > 280) {
          doc.addPage();
          y = 20;
        }

        doc.text(splitA, margin, y);
        y += aHeight + 2;
      });
    });
  }

  doc.save(`${boardLabel}_${classLabel.replace(' ','')}_Paper${activePaperIndex+1}.pdf`);
}

// Init
buildChapterList();
</script>
</body>
</html>
