<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex;height:100vh;overflow:hidden}
#sidebar{width:280px;background:#1a1a2e;color:#eee;display:flex;flex-direction:column;padding:0;flex-shrink:0}
.sb-header{padding:20px 18px 14px;border-bottom:1px solid #2e2e4e}
.sb-header h1{font-size:15px;font-weight:700;color:#fff;line-height:1.3}
.sb-header p{font-size:11px;color:#8888aa;margin-top:4px}
.sb-section{padding:14px 18px;border-bottom:1px solid #2e2e4e}
.sb-section label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#7777aa;margin-bottom:6px}
.sb-section select,.sb-section input[type=number]{width:100%;background:#12122a;border:1px solid #3a3a5c;border-radius:6px;color:#ddd;padding:7px 10px;font-size:13px;outline:none}
.sb-section select:focus,.sb-section input:focus{border-color:#6c63ff}
.chapters-area{flex:1;overflow-y:auto;padding:10px 18px}
.chapters-area label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#7777aa;margin-bottom:8px}
.ch-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer;padding:5px 7px;border-radius:5px;transition:background .15s}
.ch-item:hover{background:#2a2a4e}
.ch-item input{accent-color:#6c63ff;width:14px;height:14px;flex-shrink:0}
.ch-item span{font-size:12px;color:#ccc;line-height:1.3}
.ch-controls{display:flex;gap:6px;margin-bottom:10px}
.ch-controls button{flex:1;background:#2a2a4e;border:none;color:#aaa;font-size:11px;padding:5px;border-radius:5px;cursor:pointer}
.ch-controls button:hover{background:#3a3a6e;color:#fff}
.sb-footer{padding:14px 18px;border-top:1px solid #2e2e4e}
.sb-footer p{font-size:10px;color:#555577;line-height:1.6}
#genBtn{width:100%;background:linear-gradient(135deg,#6c63ff,#a855f7);border:none;color:#fff;font-size:14px;font-weight:600;padding:11px;border-radius:8px;cursor:pointer;margin-top:10px;transition:opacity .2s}
#genBtn:hover{opacity:.88}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#toolbar{background:#fff;border-bottom:1px solid #dde;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#toolbar h2{font-size:14px;font-weight:600;color:#333;flex:1}
.tb-btn{background:#f4f4f8;border:1px solid #dde;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;color:#444;display:none}
.tb-btn:hover{background:#e8e8f0}
#paperTabs{display:none;background:#fff;border-bottom:1px solid #dde;padding:0 20px;flex-shrink:0}
.tab{display:inline-block;padding:9px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#666}
.tab.active{border-color:#6c63ff;color:#6c63ff;font-weight:600}
#paperArea{flex:1;overflow-y:auto;padding:24px}
.empty-state{text-align:center;padding:80px 20px;color:#aaa}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;margin-bottom:6px;color:#888}
.empty-state p{font-size:13px}
.paper-doc{background:#fff;max-width:780px;margin:0 auto;padding:36px 42px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);font-family:'Times New Roman',Times,serif}
.doc-header{text-align:center;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:18px}
.doc-header h2{font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.doc-header h3{font-size:14px;font-weight:600;margin-top:4px}
.doc-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:18px}
.doc-meta span{font-weight:600}
.section-head{background:#f0f0f0;border-left:4px solid #333;padding:5px 10px;font-size:13px;font-weight:700;margin:18px 0 10px;font-family:'Segoe UI',sans-serif}
.q-row{display:flex;gap:8px;margin-bottom:10px;font-size:13px;line-height:1.6}
.q-num{font-weight:700;min-width:26px;flex-shrink:0}
.q-text{flex:1}
.ans-section{margin-top:28px;border-top:2px dashed #999;padding-top:18px}
.ans-section h4{font-size:13px;font-weight:700;margin-bottom:10px;font-family:'Segoe UI',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.ans-row{font-size:12px;margin-bottom:6px;display:flex;gap:6px}
.ans-num{font-weight:700;min-width:26px}
.ans-text{color:#333}
.diff-tab.active { background: #6c63ff !important; color: #fff !important; font-weight: 600; transition: 0.3s; }
  /* ── Print Styles ── */
@media print {
  /* 1. Faltu cheezein chhupayein */
  #sidebar, #toolbar, #paperTabs, .ch-controls, #genBtn, .sb-section {
    display: none !important;
  }

  /* 2. Layout ko clean aur full-page karein */
  body, #main, #paperArea {
    background: #fff !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: visible !important;
    height: auto !important;
    width: 100% !important;
  }

  /* 3. Paper formatting (Spacing Fix) */
  .paper-doc {
    box-shadow: none !important;
    border: none !important;
    margin: 0 !important;
    padding: 20mm !important; [span_1](start_span)/* Kinaro se gap dega[span_1](end_span) */
    width: 100% !important;
    max-width: 100% !important;
    text-align: left !important; [span_2](start_span)/* Extra spaces (Justify) khatam karega[span_2](end_span) */
    word-spacing: normal !important;
  }

  /* 4. Questions ke beech ka gap */
  .question-item, p, div {
    margin-bottom: 12px !important;
    line-height: 1.5 !important;
    color: #000 !important;
  }
}
  

  /* Page break logic: Section beech mein na kate */
  .section-block {
    page-break-inside: avoid;
    margin-bottom: 20px;
  }

  /* Answers agar hidden hain to print mein bhi na aayein */
  .ans-section {
    page-break-before: always; /* Answer key hamesha naye page se shuru ho */
  }
  /* ─── Optimized Mobile CSS ─── */
@media (max-width: 850px) {
  body {
    flex-direction: column;
    overflow-y: auto;
    height: auto;
    background: #fff;
  }

  /* Sidebar ab screen ke upar ek control panel ban jayega */
  #sidebar {
    width: 100%;
    height: auto;
    max-height: none;
    border-radius: 0 0 20px 20px;
    position: relative;
    padding-bottom: 20px;
  }

  /* Chapters list ko chota aur scrollable banaya */
  .chapters-area {
    max-height: 180px;
    background: rgba(0,0,0,0.1);
    margin: 10px 15px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);

  /* Buttons ko ek line mein laane ke liye */
  #toolbar {
    position: sticky;

    background: #ffffff;
    display: flex;

  .tb-btn {

    font-size: 10px; /* Chote phones ke liye space bachegi */

    text-align: center;

  /* Paper ka look mobile par */
  #paperArea {
    padding: 10px;

  .paper-doc {
    width: 100% !important;
    padding: 15px !important;
    margin: 0;
    box-shadow: none;
    border: 1px solid #eee;
    font-size: 13px; /* Reading ease */
  }

  .doc-header h2 { font-size: 14px; }
  .section-head { font-size: 11px; padding: 4px; }
  
  /* Select boxes aur inputs mobile friendly */
  select, input[type=number] {
    padding: 12px;
    font-size: 16px; /* Takki keyboard open hone par zoom na ho */
  }
}
  
</style>

<body>
<div id="sidebar">
  <div class="sb-header">
    <h1>📝 Question Paper Generator</h1>
    <p id="sidebarSub">ICSE Class 8 · ML Aggarwal Mathematics</p>
  </div>
  <div class="sb-section">
    <label>Curriculum</label>
    <select id="curriculumSelect" onchange="switchCurriculum()">
      <option value="icse8">ICSE Class 8</option>

    <button class="diff-tab active" data-diff="easy" onclick="setDifficulty('easy')" style="flex:1; background:none; border:none; color:#aaa; font-size:11px; padding:6px; cursor:pointer; border-radius:4px;">Easy</button>
    <button class="diff-tab" data-diff="moderate" onclick="setDifficulty('moderate')" style="flex:1; background:none; border:none; color:#aaa; font-size:11px; padding:6px; cursor:pointer; border-radius:4px;">Moderate</button>
    <button class="diff-tab" data-diff="hard" onclick="setDifficulty('hard')" style="flex:1; background:none; border:none; color:#aaa; font-size:11px; padding:6px; cursor:pointer; border-radius:4px;">Hard</button>
  </div>
</div>
  <div class="chapters-area">

</div>
<div id="main">
  <div id="toolbar">
    <h2>Generated Papers</h2>
    <button class="tb-btn" id="ansBtn" onclick="toggleAnswers()">Show Answers</button>
    <button class="tb-btn" id="dlBtn" onclick="downloadPDF()">⬇ Download PDF</button>

<script>
// ─── Utilities ────────────────────────────────────────────────────────────────
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function gcd(a,b){return b?gcd(b,a%b):a}
function lcm(a,b){return a*b/gcd(a,b)}
function ff(n,d){
  let g=gcd(Math.abs(n),Math.abs(d));
  if(d<0){n=-n;d=-d}
  if((d/g)===1) return `${n/g}`;
  return `${n/g}/${d/g}`;
}
function mixed(w,n,d){return `${w} ${n}/${d}`}
function name(){return pick(['Ravi','Priya','Amit','Sita','Kiran','Mohan','Deepa','Arjun','Nisha','Vijay','Anita','Suresh'])}
function primeFactors(n){let f=[];for(let i=2;i*i<=n;i++){while(n%i===0){f.push(i);n/=i}}if(n>1)f.push(n);return f}
function isPrime(n){if(n<2)return false;for(let i=2;i*i<=n;i++)if(n%i===0)return false;return true}

// ─── State ────────────────────────────────────────────────────────────────────
let currentCurriculum = 'icse8';
let currentDifficulty = 'easy'; // Ye naye variable ko add kiya gaya hai
let generatedPapers = [];
let activePaperIndex = 0;
let showAnswers = false;

// Ye naya function hai jo buttons ko click karne par kaam karega
function setDifficulty(d) {
  currentDifficulty = d; // Difficulty update
  
  // Sabhi difficulty buttons se 'active' class hatayein
  document.querySelectorAll('.diff-tab').forEach(t => t.classList.remove('active'));
  
  // Jo button click hua hai, uspar 'active' class lagayein
  const activeBtn = document.querySelector(`[data-diff="${d}"]`);
  if(activeBtn) {
    activeBtn.classList.add('active');
  }
  
  console.log("Difficulty set to: " + currentDifficulty);
}

// ─── Chapter Lists ────────────────────────────────────────────────────────────
const CHAPTERS_ICSE8 = [
  'Rational Numbers','Exponents','Squares and Square Roots','Cubes and Cube Roots',
  'Algebraic Expressions and Identities','Factorisation','Linear Equations',
  'Direct and Inverse Variation','Percentage and its Applications',
  'Mensuration','Data Handling','Graphs'
];
const CHAPTERS_CBSE9 = [
  'Number Systems','Polynomials','Coordinate Geometry',
  'Linear Equations in Two Variables','Introduction to Euclid Geometry',
  'Lines and Angles','Triangles','Quadrilaterals',
  'Areas of Parallelograms and Triangles','Circles',
  'Herons Formula','Surface Areas and Volumes','Statistics','Probability'
];
function getCurrentChapters(){return currentCurriculum==='cbse9'?CHAPTERS_CBSE9:CHAPTERS_ICSE8}

// ═══════════════════════════════════════════════════════════════════════════════
// ICSE CLASS 8 GENERATORS
// ═══════════════════════════════════════════════════════════════════════════════
const G_ICSE8 = {};

G_ICSE8['Rational Numbers']={
  easy:[
    ()=>{const n=rng(1,9),d=rng(2,10);return{topic:'Simplify rational number',text:`Simplify the rational number ${ff(n*2,d*2)}.`,answer:`${ff(n,d)}`}},
    ()=>{const a=rng(1,5),b=rng(2,8),c=rng(1,5),d=rng(2,8);return{topic:'Add rational numbers',text:`Add ${ff(a,b)} + ${ff(c,d)}.`,answer:`${ff(a*d+c*b,b*d)}`}},
    ()=>{const a=rng(1,9),b=rng(2,10);return{topic:'Additive inverse',text:`Find the additive inverse of ${ff(a,b)}.`,answer:`${ff(-a,b)}`}},
    ()=>{const a=rng(1,9),b=rng(2,10);return{topic:'Multiplicative inverse',text:`Find the multiplicative inverse (reciprocal) of ${ff(a,b)}.`,answer:`${ff(b,a)}`}},
    ()=>{const a=rng(-9,-1),b=rng(2,10);return{topic:'Represent on number line',text:`Represent ${ff(a,b)} on the number line. Between which two integers does it lie?`,answer:`Between ${Math.ceil(a/b)-1} and ${Math.ceil(a/b)}`}},
    ()=>{const n=rng(1,5),d=rng(2,6);return{topic:'Compare rational numbers',text:`Which is greater: ${ff(n,d)} or ${ff(n+1,d)}?`,answer:`${ff(n+1,d)} is greater`}},
    ()=>{const a=rng(1,8),b=rng(2,9);return{topic:'Subtract rational numbers',text:`Subtract ${ff(a,b)} from 1.`,answer:`${ff(b-a,b)}`}},
    ()=>{const a=rng(2,8),b=rng(2,8);return{topic:'Multiply rational numbers',text:`Multiply ${ff(a,b)} \u00d7 ${ff(b,a)}.`,answer:`1`}},
    ()=>{const a=rng(1,5),b=rng(2,7);return{topic:'Divide rational numbers',text:`Divide ${ff(a,b)} \u00f7 ${ff(a,b)}.`,answer:`1`}},
    ()=>{const a=rng(1,9);return{topic:'Rational between integers',text:`Write any two rational numbers between ${a} and ${a+1}.`,answer:`e.g. ${ff(2*a+1,2)} and ${ff(4*a+3,4)}`}},
    // NEW ADDITIONS
    ()=>{const a=rng(1,6),b=rng(2,8),c=rng(1,6),d=rng(2,8);return{topic:'Identify property',text:`Identify the property used: ${ff(a,b)} + ${ff(c,d)} = ${ff(c,d)} + ${ff(a,b)}.`,answer:`Commutative property of addition of rational numbers`}},
    ()=>{const a=rng(1,5),b=rng(2,7);return{topic:'Verify additive inverse',text:`Verify that the sum of ${ff(a,b)} and its additive inverse is zero.`,answer:`${ff(a,b)} + (${ff(-a,b)}) = ${ff(a-a,b)} = 0. Verified.`}},
    ()=>{const a=rng(2,8),b=rng(3,9);return{topic:'Standard form',text:`Express ${ff(-a*3,b*3)} in standard form (denominator positive, simplest form).`,answer:`${ff(-a,b)}`}},
    ()=>{const a=rng(1,5),b=rng(2,8),c=rng(1,5);return{topic:'Give an example of',text:`Give an example of a rational number between ${ff(a,b)} and ${ff(a+c,b)}.`,answer:`e.g. ${ff(2*a+c,2*b)} (multiply numerator and denominator to find a number between them)`}},
    ()=>{const a=rng(1,5),b=rng(2,8);return{topic:'Real-life application',text:`A recipe uses ${ff(a,b)} cup of sugar for one batch. How much sugar is needed for 3 batches?`,answer:`${ff(3*a,b)} cups`}},
    ()=>{const n=rng(2,6),d=rng(3,9);return{topic:'Equivalent rational numbers',text:`Write three rational numbers equivalent to ${ff(n,d)}.`,answer:`${ff(n*2,d*2)}, ${ff(n*3,d*3)}, ${ff(n*4,d*4)}`}},
  ],
  moderate:[
    ()=>{const a=rng(1,5),b=rng(3,8),c=rng(1,5),d=rng(3,8),e=rng(1,4),f=rng(3,7);return{topic:'Add three rationals',text:`Simplify: ${ff(a,b)} + ${ff(c,d)} \u2212 ${ff(e,f)}.`,answer:`Compute by taking LCM of ${b},${d},${f}`}},
    ()=>{const a=rng(2,6),b=rng(3,9),c=rng(2,6),d=rng(3,9);return{topic:'Multiply and simplify',text:`Simplify: ${ff(a,b)} \u00d7 ${ff(c,d)} \u00d7 ${ff(b,a)}.`,answer:`${ff(c,d)}`}},
    ()=>{const n=rng(1,4);return{topic:'Rational numbers between two rationals',text:`Find three rational numbers between ${ff(1,n+1)} and ${ff(1,n)}.`,answer:`Multiply numerator and denominator to get equivalent fractions and pick values in between`}},
    ()=>{const a=rng(2,7),b=rng(3,9);return{topic:'Distributive property',text:`Verify distributive property: ${ff(a,b)} \u00d7 (${ff(1,2)} + ${ff(1,3)}).`,answer:`${ff(a,b)} \u00d7 ${ff(5,6)} = ${ff(5*a,6*b)}`}},
    ()=>{const a=rng(1,5),b=rng(2,8),c=rng(1,5),d=rng(2,8);return{topic:'Word problem \u2013 sharing',text:`${name()} has ${ff(a,b)} of a pizza and gives ${ff(c,d)} to a friend. How much is left?`,answer:`${ff(a*d-c*b,b*d)}`}},
    ()=>{const a=rng(2,6),b=rng(3,8);return{topic:'Closure property',text:`Show that rational numbers are closed under addition using ${ff(a,b)} and ${ff(b-1,b)}.`,answer:`${ff(a,b)} + ${ff(b-1,b)} = ${ff(a+b-1,b)}, which is also a rational number`}},
    ()=>{const a=rng(1,5),b=rng(2,7);return{topic:'Arrange in ascending order',text:`Arrange in ascending order: ${ff(a,b)}, ${ff(a+1,b)}, ${ff(a-1,b)}, ${ff(a,b+1)}.`,answer:`Compare by converting to same denominator`}},
    ()=>{const x=rng(2,8);return{topic:'Find rational number',text:`Find a rational number exactly midway between ${ff(1,x)} and ${ff(1,x-1)}.`,answer:`${ff(2*x-1,2*x*(x-1))}`}},
    // NEW ADDITIONS
    ()=>{const a=rng(2,5),b=rng(3,8),c=rng(2,5),d=rng(3,8);return{topic:'Identify property',text:`Identify the property: (${ff(a,b)} + ${ff(c,d)}) + ${ff(1,2)} = ${ff(a,b)} + (${ff(c,d)} + ${ff(1,2)}).`,answer:`Associative property of addition of rational numbers`}},
    ()=>{const a=rng(1,4),b=rng(2,7),c=rng(1,4),d=rng(2,7),e=rng(1,4),f=rng(2,7);return{topic:'Verify LHS=RHS',text:`Verify: ${ff(a,b)} \u00d7 (${ff(c,d)} + ${ff(e,f)}) = ${ff(a,b)} \u00d7 ${ff(c,d)} + ${ff(a,b)} \u00d7 ${ff(e,f)}.`,answer:`LHS: compute bracket first, then multiply. RHS: distribute and add. Both sides must be equal \u2014 distributive law.`}},
    ()=>{const p=rng(100,500),q=rng(2,5);return{topic:'Real-life application',text:`A water tank is ${ff(3,4)} full and contains ${p*q} litres. After ${ff(1,q)} of total capacity is used, how many litres remain?`,answer:`Total capacity = ${p*q*4/3} L; Remaining fraction = ${ff(3,4)} - ${ff(1,q)} = ${ff(3*q-4,4*q)}; Remaining = ${(p*q*4/3)*(3*q-4)/(4*q)} L`}},
    ()=>{const a=rng(1,5),b=rng(2,8);return{topic:'Absolute value',text:`Is |${ff(-a,b)}| equal to ${ff(a,b)}? State the property used.`,answer:`Yes. |${ff(-a,b)}| = ${ff(a,b)} because the absolute value of a rational number equals the absolute value of its additive inverse.`}},
  ],
  hard:[
    ()=>{const a=rng(2,5),b=rng(3,7);return{topic:'Properties proof',text:`Using properties of rational numbers, show that ${ff(a,b)} \u00d7 (${ff(b,a)} + ${ff(-1,a)}) = 1 \u2212 ${ff(1,b)}.`,answer:`Expand: ${ff(a,b)}\u00d7${ff(b,a)} + ${ff(a,b)}\u00d7${ff(-1,a)} = 1 \u2212 ${ff(1,b)}`}},
    ()=>{return{topic:'Insert rational numbers',text:`Insert 5 rational numbers between \u22121/2 and 1/2.`,answer:`\u22122/5, \u22121/5, 0, 1/5, 2/5 (multiply numerator and denominator by 6)`}},
    ()=>{const a=rng(2,5),b=rng(3,8);return{topic:'Complex expression',text:`Simplify: [${ff(a,b)} \u00f7 ${ff(a,b+1)}] \u00d7 [${ff(b+1,b)} \u2212 1].`,answer:`= ${ff(b+1,b)} \u00d7 ${ff(1,b)} = ${ff(b+1,b*b)}`}},
    ()=>{return{topic:'Word problem \u2013 multi-step',text:`A tank is ${ff(3,4)} full. After removing ${ff(1,6)} of its capacity, what fraction remains? If the tank holds 240 L, find the actual amount remaining.`,answer:`${ff(3,4)} \u2212 ${ff(1,6)} = ${ff(7,12)}; Amount = ${ff(7,12)} \u00d7 240 = 140 L`}},

    () => { const n=rng(5,12), r=rng(2,n-2); return { topic:'Combination-based probability (selections)', text:`A class has ${n} boys and ${n-r} girls. Two students are chosen at random. Find P(both are boys).`, answer:`P = C(${n},2) / C(${2*n-r},2) = ${n*(n-1)/2} / ${(2*n-r)*(2*n-r-1)/2} = ${(n*(n-1)/((2*n-r)*(2*n-r-1))).toFixed(4)}` } },
    () => { return { topic:'Cards — suit and face', text:`A card is drawn from 52 cards. Find: P(heart), P(king of hearts), P(king or heart).`, answer:`P(heart) = 13/52 = 1/4; P(king of hearts) = 1/52; P(king or heart) = 13+4−1=16 favourable; P = 16/52 = 4/13` } },
    () => { return { topic:'Law of Large Numbers', text:`Explain why empirical probability approaches theoretical probability as the number of trials increases.`, answer:`The Law of Large Numbers states that as the number of trials n → ∞, the relative frequency of an event converges to its theoretical probability. More trials reduce the effect of random fluctuations.` } },
    () => { return { topic:'Mutually exclusive events', text:`A die is rolled. Let A = {1,2}, B = {3,4}, C = {5,6}. Verify these are mutually exclusive and that P(A)+P(B)+P(C) = 1.`, answer:`A∩B = ∅, B∩C = ∅, A∩C = ∅ → mutually exclusive. P(A) = 2/6 = 1/3; P(B) = 1/3; P(C) = 1/3; Sum = 1. ✓` } },

    () => { return { topic:'Real-life application — insurance risk', text:`In a city, 3 out of every 50 houses are burglarised each year. Find P(a house is burglarised) and P(it is safe). If there are 5000 houses, how many are expected to be burglarised?`, answer:`P(burglarised) = 3/50 = 0.06; P(safe) = 47/50 = 0.94; Expected = 0.06 × 5000 = 300 houses` } },
    () => { return { topic:'Verify: sum of all event probabilities = 1', text:`A die is rolled. Event A = {1}, B = {2}, C = {3,4}, D = {5,6}. Verify that P(A)+P(B)+P(C)+P(D) = 1.`, answer:`P(A) = 1/6, P(B) = 1/6, P(C) = 2/6, P(D) = 2/6; Sum = 1/6+1/6+2/6+2/6 = 6/6 = 1. ✓` } },
    () => { return { topic:'Empirical vs theoretical — large sample', text:`A fair coin is tossed 1000 times and heads appears 487 times. Find the empirical probability and compare it to 0.5. What does the difference tell us?`, answer:`Empirical P(H) = 487/1000 = 0.487; Theoretical = 0.5. Difference = 0.013. This small gap is expected due to natural random variation; with more trials, the empirical value would converge closer to 0.5 (Law of Large Numbers).` } },
    () => { return { topic:'Two-stage experiment — tree diagram', text:`A bag has 3 red and 2 blue balls. A ball is drawn, its colour noted, then put back, and a second ball drawn. Find P(both red) and P(one of each colour).`, answer:`P(RR) = (3/5)×(3/5) = 9/25; P(RB or BR) = (3/5)×(2/5) + (2/5)×(3/5) = 12/25` } },
  ]
};

function getGeneratorSet(){return currentCurriculum==='cbse9'?G_CBSE9:G_ICSE8}

function buildPool(chapters){
  const pool=[];
  const GG=getGeneratorSet();
  const globalUsed=new Set();
  chapters.forEach(ch=>{
    const g=GG[ch];if(!g)return;
    let levels;
    if(currentDifficulty==='easy'){
      levels=[['easy',1],['easy',2],['moderate',3],['moderate',4]];
    } else if(currentDifficulty==='moderate'){
      levels=[['easy',1],['moderate',2],['moderate',3],['hard',4]];
    } else {
      levels=[['moderate',1],['hard',2],['hard',3],['hard',4]];
    }
    levels.forEach(([level,marks])=>{
      if(!g[level])return;
      g[level].forEach((fn)=>{
        try{
          const q=fn();
          if(q&&q.text&&!globalUsed.has(q.text)){
            globalUsed.add(q.text);
            pool.push({chapter:ch,level,marks,topic:q.topic,text:q.text,answer:q.answer});
          }
        }catch(e){}
      });
    });
  });
  return pool;
}

function pickBalanced(pool,count,marks){
  const byChapter={};
  pool.filter(q=>q.marks===marks).forEach(q=>{(byChapter[q.chapter]=byChapter[q.chapter]||[]).push(q);});
  const chapters=Object.keys(byChapter);if(!chapters.length)return[];
  const result=[];let ci=0;
  while(result.length<count&&chapters.some(c=>byChapter[c].length>0)){
    const ch=chapters[ci%chapters.length];ci++;
    if(!byChapter[ch]||!byChapter[ch].length)continue;
    const idx=Math.floor(Math.random()*byChapter[ch].length);
    result.push(byChapter[ch].splice(idx,1)[0]);
  }
  return result;
}

function buildPaper(chapters){
  const pool=buildPool(chapters);
  const sections=[
  {name:'A',marks:1,count:10,label:'(1 mark each)'},
  {name:'B',marks:2,count:8, label:'(2 marks each)'},
  {name:'C',marks:3,count:7, label:'(3 marks each)'},
  {name:'D',marks:4,count:5, label:'(4 marks each)'},
];
  const paper={sections:[]};
  sections.forEach(s=>{
    const qs=pickBalanced(pool,s.count,s.marks);
    paper.sections.push({...s,questions:qs});
  });
  return paper;
}

  paper.sections.forEach(s => {
    html += `<div class="section-head">Section ${s.name} ${s.label}</div>`;
    s.questions.forEach(q => {
      qNum++;
      
      // Sabhi ajeeb characters ki safai
      let cleanText = String(q.text)
        .replace(/''/g, '-') 
        .replace(/(\w|\d)"(\s*)(\w|\d)/g, '$1 - $3')

      html += `<div class="q-row">

    });
  });

  html += `<div class="ans-section" id="ans-${idx}" style="display:${showAnswers ? 'block' : 'none'}">
    <h4>Answer Key</h4>`;
  
  qNum = 0;
  paper.sections.forEach(s => {
    s.questions.forEach(q => {
      qNum++;
    // ✅ Correct
      let aText = String(q.answer || "");
let cleanAns = aText
  .replace(/\u2212/g, '-')
  .replace(/\u2013|\u2014/g, '-')
  .replace(/''/g, '-')
  .replace(/(\w)\s*"\s*(\w)/g, '$1 - $2')
  .replace(/"/g, '')
  .replace(/[^\x00-\x7F]/g, function(c) {
    const map = {'²':'2','³':'3','⁴':'4','÷':'/','×':'x','π':'pi','∛':'cbrt','°':'deg','√':'sqrt'};
    return map[c] || '';
  })
  .replace(/\s+/g, ' ')
  .trim();
      html += `<div class="ans-row"><span class="ans-num">${qNum}.</span><span class="ans-text">${cleanAns}</span></div>`;
    });
  });

  html += `</div></div>`;
  return html;

function generatePapers(){
  const n = Math.min(5, Math.max(1, parseInt(document.getElementById('numPapers').value) || 1));
  let chapters = getSelectedChapters();
  if(!chapters.length){
    buildChapterList();
    chapters = getSelectedChapters();
  }
  if(!chapters.length){
    alert('Please select at least one chapter.');
    return;
  }
  generatedPapers = [];
  for(let i = 0; i < n; i++){
    generatedPapers.push(buildPaper(chapters));
  }
  activePaperIndex = 0;
  showAnswers = false;
  renderAll();
  if(window.innerWidth < 850){
    const t = document.getElementById('toolbar');
    if(t) t.scrollIntoView({ behavior:'smooth' });
  }
}
  

function renderAll(){
  const tabs=document.getElementById('paperTabs');
  const area=document.getElementById('paperArea');
  if(!generatedPapers.length){tabs.style.display='none';area.innerHTML='<div class="empty-state"><div class="icon">📄</div><h3>No papers generated yet</h3><p>Select chapters and click Generate Papers</p></div>';['ansBtn','dlBtn','printBtn'].forEach(id=>document.getElementById(id).style.display='none');return;}
  tabs.style.display='block';
  tabs.innerHTML=generatedPapers.map((_,i)=>`<span class="tab${i===activePaperIndex?' active':''}" onclick="switchTab(${i})">Paper ${i+1}</span>`).join('');

  document.getElementById('ansBtn').style.display='inline-block';
  document.getElementById('ansBtn').textContent=showAnswers?'Hide Answers':'Show Answers';
  document.getElementById('dlBtn').style.display='inline-block';
  document.getElementById('printBtn').style.display='inline-block';
}

function switchTab(i){activePaperIndex=i;renderAll();}

function toggleAnswers(){

  document.getElementById('ansBtn').textContent=showAnswers?'Hide Answers':'Show Answers';

}

  document.getElementById('sidebarSub').textContent=isCBSE?'CBSE Class 9 · NCERT Mathematics':'ICSE Class 8 · ML Aggarwal Mathematics';
  document.getElementById('sidebarFooter').innerHTML=isCBSE?'NCERT Class 9 · Dynamically generated<br/>No two papers are ever the same.':'ML Aggarwal Class 8 · Dynamically generated<br/>No two papers are ever the same.';

}

function selAll(){getCurrentChapters().forEach((_,i)=>{const el=document.getElementById(`ch-${i}`);if(el)el.checked=true;});}
function selNone(){getCurrentChapters().forEach((_,i)=>{const el=document.getElementById(`ch-${i}`);if(el)el.checked=false;});}
function drawSqrt(doc, x, yPos, text, fontSize) {
  doc.setFontSize(fontSize);
  const textW = doc.getTextWidth(text);
  const h = fontSize * 0.45;
  doc.setLineWidth(0.3);
  doc.line(x, yPos, x + 1.5, yPos + 2);
  doc.line(x + 1.5, yPos + 2, x + 3, yPos - h);
  doc.line(x + 3, yPos - h, x + 3 + textW + 2, yPos - h);
  doc.text(text, x + 3.5, yPos);
  return x + 3.5 + textW + 2;
}

function drawCbrt(doc, x, yPos, text, fontSize) {
  doc.setFontSize(fontSize * 0.55);
  doc.text('3', x + 0.5, yPos - 1.8);
  doc.setFontSize(fontSize);
  const textW = doc.getTextWidth(text);
  const h = fontSize * 0.45;
  doc.setLineWidth(0.3);
  doc.line(x + 1.5, yPos, x + 3, yPos + 2);
  doc.line(x + 3, yPos + 2, x + 4.5, yPos - h);
  doc.line(x + 4.5, yPos - h, x + 4.5 + textW + 2, yPos - h);
  doc.text(text, x + 5, yPos);
  return x + 5 + textW + 2;
}

function drawAngle(doc, x, yPos) {
  doc.setLineWidth(0.3);
  doc.line(x, yPos, x + 3.5, yPos);
  doc.line(x, yPos, x + 2.5, yPos - 3.5);
  return x + 4.5;
}

function renderMathText(doc, fullText, startX, startY, maxWidth) {
  const fontSize = 10;
  doc.setFontSize(fontSize);
  // Fixed split: Handles complex powers, roots, and angle symbols
  const parts = fullText.split(/(sqrt\([^)]+\)|cbrt\([^)]+\)|<sup>.*?<\/sup>|∠[A-Z]+)/g);
  let curX = startX;
  let curY = startY;
  const lineH = 6;

  parts.forEach(part => {
    if (!part) return;
    const sqrtMatch = part.match(/^sqrt\(([^)]+)\)$/);
    const cbrtMatch = part.match(/^cbrt\(([^)]+)\)$/);
    const supMatch = part.match(/^<sup>([^<]+)<\/sup>$/);
    const angleMatch = part.match(/^∠([A-Z]+)$/);

    if (sqrtMatch) {
      curX = drawSqrt(doc, curX, curY, sqrtMatch[1], fontSize);
    } else if (cbrtMatch) {
      curX = drawCbrt(doc, curX, curY, cbrtMatch[1], fontSize);
    } else if (supMatch) {
      doc.setFontSize(fontSize * 0.7);
      doc.text(supMatch[1], curX, curY - 2.5);
      curX += doc.getTextWidth(supMatch[1]) + 0.8;
      doc.setFontSize(fontSize);
    } else if (angleMatch) {
      curX = drawAngle(doc, curX, curY);
      doc.text(angleMatch[1], curX, curY);
      curX += doc.getTextWidth(angleMatch[1]) + 1;
    } else {
      const words = part.split(' ');
      words.forEach((word) => {
        if (!word) return;
        if (word.includes('°')) {
          let sub = word.split('°');
          doc.text(sub[0], curX, curY);
          curX += doc.getTextWidth(sub[0]);
          doc.setFontSize(fontSize * 0.6);
          doc.text('o', curX, curY - 2.5);
          curX += 2;
          doc.setFontSize(fontSize);
          if (sub[1]) { doc.text(sub[1], curX, curY); curX += doc.getTextWidth(sub[1]); }
          curX += 1;
          return;
        }
        const w = doc.getTextWidth(word + ' ');
        if (curX + w > startX + maxWidth && curX > startX) {
          curX = startX;
          curY += lineH;
        }
        doc.text(word + ' ', curX, curY);
        curX += w;
      });
    }
  });
  return (curY - startY) + lineH;
}

function downloadPDF() {
  if (!generatedPapers.length) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const isICSE = currentCurriculum === 'icse8';
  const classLabel = isICSE ? 'Class VIII' : 'Class IX';
  const boardLabel = isICSE ? 'ICSE' : 'CBSE';
  const paper = generatedPapers[activePaperIndex];

  const margin = 15;
  const pageW = 210;
  const contentW = pageW - margin * 2;
  let y = 18;

  function checkPage(needed) {
    if (y + needed > 285) { doc.addPage(); y = 15; }
  }

// --- Final Professional Header (Date, Difficulty, Chapters) ---
  doc.setFont('helvetica', 'bold').setFontSize(15);
  doc.text(`${boardLabel} MATHEMATICS EXAMINATION`, pageW / 2, y, { align: 'center' });
  y += 7;

  // 1. Calculations (Date aur Chapters)
  const today = new Date().toLocaleDateString('en-GB'); 
  const selectedChapters = getSelectedChapters();
  let subTitle = `${classLabel}  ·  Paper ${activePaperIndex + 1}`;
  
  if (selectedChapters.length > 0 && selectedChapters.length < 4) {
    subTitle += ` (${selectedChapters.join(', ')})`;
  }

  doc.setFontSize(10);
  doc.text(subTitle, pageW / 2, y, { align: 'center' });
  y += 7;

  doc.setLineWidth(0.5);
  doc.line(margin, y, pageW - margin, y);
  y += 6;

  // 2. Info Row (Date | Difficulty | Marks)
  doc.setFont('helvetica', 'bold').setFontSize(10);
  doc.text(`Date: ${today}`, margin, y); // Left: Date
  
  // Center: Difficulty (Capitalize karke)
  const diffLabel = currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1);
  doc.text(`Level: ${diffLabel}`, pageW / 2, y, { align: 'center' });
  
  doc.text(`Max Marks: `, pageW - margin, y, { align: 'right' }); // Right: Marks
  y += 6;
  
  doc.setFont('helvetica', 'normal');
  doc.text(`Time: 3 Hours`, margin, y);
  y += 8;

  doc.setFontSize(9).setFont('helvetica', 'italic');
  doc.text('General Instructions: Attempt all questions. Show all working. Figures to the right indicate marks.', margin, y);
  y += 8;
  
  let qNum = 0;
  paper.sections.forEach(s => {
    checkPage(15);
    doc.setFillColor(240, 240, 240);
    doc.rect(margin, y - 4, contentW, 7, 'F');
    doc.setFont('helvetica', 'bold').setFontSize(11);
    doc.text(`Section ${s.name}  ${s.label}`, margin + 2, y);
    y += 10;

    s.questions.forEach(q => {
      qNum++;
      let txt = String(q.text)
        .replace(/\^(\((?:[^)(]+|\((?:[^)(]+|\([^)(]*\))*\))*\)|[a-zA-Z0-9]+)/g, '<sup>$1</sup>')
        .replace(/\?([A-Z]+)/g, '∠$1')
        .replace(/√\s*(\d+)/g, 'sqrt($1)')
        .replace(/∛\s*(\d+)/g, 'cbrt($1)')
        .replace(/²/g, '<sup>2</sup>').replace(/³/g, '<sup>3</sup>')
        .replace(/<(?!sup|\/sup)[^>]+>/g, '')
        .replace(/₹/g, 'Rs.').replace(/π/g, 'pi')
        .replace(/[−\u2212\u2013\u2014]/g, '-')
        .replace(/deg/g, '°')
        .replace(/[^\x00-\x7F\u2220]/g, '');

      checkPage(12);
      doc.setFont('helvetica', 'bold').setFontSize(10.5);
      doc.text(`${qNum}.`, margin, y);
      doc.setFont('helvetica', 'normal');

      const heightUsed = renderMathText(doc, txt, margin + 8, y, contentW - 10);
      y += heightUsed;
    });
    y += 5;
  });

  if (showAnswers) {
    doc.addPage(); y = 15;
    doc.setFont('helvetica', 'bold').setFontSize(13);
    doc.text('ANSWER KEY', pageW / 2, y, { align: 'center' });
    y += 10;
    let aN = 0;
    paper.sections.forEach(s => {
      s.questions.forEach(q => {
        aN++;
        let ans = String(q.answer || '')
          .replace(/\^(\((?:[^)(]+|\((?:[^)(]+|\([^)(]*\))*\))*\)|[a-zA-Z0-9]+)/g, '<sup>$1</sup>')
          .replace(/\?([A-Z]+)/g, '∠$1')
          .replace(/√\s*(\d+)/g, 'sqrt($1)')
          .replace(/[−\u2212\u2013\u2014]/g, '-')
          .replace(/[^\x00-\x7F\u2220]/g, '');

        checkPage(10);
        doc.setFont('helvetica', 'bold').setFontSize(10);
        doc.text(`${aN}.`, margin, y);
        doc.setFont('helvetica', 'normal');
        const aHeight = renderMathText(doc, ans, margin + 8, y, contentW - 10);
        y += aHeight;
      });
    });
  }
  doc.save(`${boardLabel}_${classLabel.replace(' ', '')}_Paper${activePaperIndex + 1}.pdf`);
}
