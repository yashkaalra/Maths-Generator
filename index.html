<script>
// â”€â”€â”€ Utilities â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function gcd(a,b){return b?gcd(b,a%b):a}
function lcm(a,b){return a*b/gcd(a,b)}
function ff(n,d){let g=gcd(Math.abs(n),Math.abs(d));if(d<0){n=-n;d=-d}return `${n/g}/${d/g}`}
function mixed(w,n,d){return `${w} ${n}/${d}`}
function name(){return pick(['Ravi','Priya','Amit','Sita','Kiran','Mohan','Deepa','Arjun','Nisha','Vijay','Anita','Suresh'])}
function primeFactors(n){let f=[];for(let i=2;i*i<=n;i++){while(n%i===0){f.push(i);n/=i}}if(n>1)f.push(n);return f}
function isPrime(n){if(n<2)return false;for(let i=2;i*i<=n;i++)if(n%i===0)return false;return true}

// â”€â”€â”€ State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let currentCurriculum = 'icse8';
let currentDifficulty = 'easy'; // Ye naye variable ko add kiya gaya hai
let generatedPapers = [];
let activePaperIndex = 0;
let showAnswers = false;

// Ye naya function hai jo buttons ko click karne par kaam karega
function setDifficulty(d) {
  currentDifficulty = d; // Difficulty update
  
  // Sabhi difficulty buttons se 'active' class hatayein
  document.querySelectorAll('.diff-tab').forEach(t => t.classList.remove('active'));
  
  // Jo button click hua hai, uspar 'active' class lagayein
  const activeBtn = document.querySelector(`[data-diff="${d}"]`);
  if(activeBtn) {
    activeBtn.classList.add('active');
  }
  
  console.log("Difficulty set to: " + currentDifficulty);
}

// â”€â”€â”€ Chapter Lists â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const CHAPTERS_ICSE8 = [
  'Rational Numbers','Exponents','Squares and Square Roots','Cubes and Cube Roots',
  'Algebraic Expressions and Identities','Factorisation','Linear Equations',
  'Direct and Inverse Variation','Percentage and its Applications',
  'Mensuration','Data Handling','Graphs'
];
const CHAPTERS_CBSE9 = [
  'Number Systems','Polynomials','Coordinate Geometry',
  'Linear Equations in Two Variables','Introduction to Euclid Geometry',
  'Lines and Angles','Triangles','Quadrilaterals',
  'Areas of Parallelograms and Triangles','Circles',
  'Herons Formula','Surface Areas and Volumes','Statistics','Probability'
];
function getCurrentChapters(){return currentCurriculum==='cbse9'?CHAPTERS_CBSE9:CHAPTERS_ICSE8}

// â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
// ICSE CLASS 8 GENERATORS
// â•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گâ•گ
const G_ICSE8 = {};

G_ICSE8['Rational Numbers']={
  easy:[
    ()=>{const n=rng(1,9),d=rng(2,10);return{topic:'Simplify rational number',text:`Simplify the rational number ${ff(n*2,d*2)}.`,answer:`${ff(n,d)}`}},
    ()=>{const a=rng(1,5),b=rng(2,8),c=rng(1,5),d=rng(2,8);return{topic:'Add rational numbers',text:`Add ${ff(a,b)} + ${ff(c,d)}.`,answer:`${ff(a*d+c*b,b*d)}`}},
    ()=>{const a=rng(1,9),b=rng(2,10);return{topic:'Additive inverse',text:`Find the additive inverse of ${ff(a,b)}.`,answer:`${ff(-a,b)}`}},
    ()=>{const a=rng(1,9),b=rng(2,10);return{topic:'Multiplicative inverse',text:`Find the multiplicative inverse (reciprocal) of ${ff(a,b)}.`,answer:`${ff(b,a)}`}},
    ()=>{const a=rng(-9,-1),b=rng(2,10);return{topic:'Represent on number line',text:`Represent ${ff(a,b)} on the number line. Between which two integers does it lie?`,answer:`Between ${Math.ceil(a/b)-1} and ${Math.ceil(a/b)}`}},
    ()=>{const n=rng(1,5),d=rng(2,6);return{topic:'Compare rational numbers',text:`Which is greater: ${ff(n,d)} or ${ff(n+1,d)}?`,answer:`${ff(n+1,d)} is greater`}},
    ()=>{const a=rng(1,8),b=rng(2,9);return{topic:'Subtract rational numbers',text:`Subtract ${ff(a,b)} from 1.`,answer:`${ff(b-a,b)}`}},
    ()=>{const a=rng(2,8),b=rng(2,8);return{topic:'Multiply rational numbers',text:`Multiply ${ff(a,b)} أ— ${ff(b,a)}.`,answer:`1`}},
    ()=>{const a=rng(1,5),b=rng(2,7);return{topic:'Divide rational numbers',text:`Divide ${ff(a,b)} أ· ${ff(a,b)}.`,answer:`1`}},
    ()=>{const a=rng(1,9);return{topic:'Rational between integers',text:`Write any two rational numbers between ${a} and ${a+1}.`,answer:`e.g. ${ff(2*a+1,2)} and ${ff(4*a+3,4)}`}},
  ],
  moderate:[
    ()=>{const a=rng(1,5),b=rng(3,8),c=rng(1,5),d=rng(3,8),e=rng(1,4),f=rng(3,7);return{topic:'Add three rationals',text:`Simplify: ${ff(a,b)} + ${ff(c,d)} âˆ’ ${ff(e,f)}.`,answer:`Compute by taking LCM of ${b},${d},${f}`}},
    ()=>{const a=rng(2,6),b=rng(3,9),c=rng(2,6),d=rng(3,9);return{topic:'Multiply and simplify',text:`Simplify: ${ff(a,b)} أ— ${ff(c,d)} أ— ${ff(b,a)}.`,answer:`${ff(c,d)}`}},
    ()=>{const n=rng(1,4);return{topic:'Rational numbers between two rationals',text:`Find three rational numbers between ${ff(1,n+1)} and ${ff(1,n)}.`,answer:`Multiply numerator and denominator to get equivalent fractions and pick values in between`}},
    ()=>{const a=rng(2,7),b=rng(3,9);return{topic:'Distributive property',text:`Verify distributive property: ${ff(a,b)} أ— (${ff(1,2)} + ${ff(1,3)}).`,answer:`${ff(a,b)} أ— ${ff(5,6)} = ${ff(5*a,6*b)}`}},
    ()=>{const a=rng(1,5),b=rng(2,8),c=rng(1,5),d=rng(2,8);return{topic:'Word problem â€“ sharing',text:`${name()} has ${ff(a,b)} of a pizza and gives ${ff(c,d)} to a friend. How much is left?`,answer:`${ff(a*d-c*b,b*d)}`}},
    ()=>{const a=rng(2,6),b=rng(3,8);return{topic:'Closure property',text:`Show that rational numbers are closed under addition using ${ff(a,b)} and ${ff(b-1,b)}.`,answer:`${ff(a,b)} + ${ff(b-1,b)} = ${ff(a+b-1,b)}, which is also a rational number`}},
    ()=>{const a=rng(1,5),b=rng(2,7);return{topic:'Arrange in ascending order',text:`Arrange in ascending order: ${ff(a,b)}, ${ff(a+1,b)}, ${ff(a-1,b)}, ${ff(a,b+1)}.`,answer:`Compare by converting to same denominator`}},
    ()=>{const x=rng(2,8);return{topic:'Find rational number',text:`Find a rational number exactly midway between ${ff(1,x)} and ${ff(1,x-1)}.`,answer:`${ff(2*x-1,2*x*(x-1))}`}},
  ],
  hard:[
    ()=>{const a=rng(2,5),b=rng(3,7);return{topic:'Properties proof',text:`Using properties of rational numbers, show that ${ff(a,b)} أ— (${ff(b,a)} + ${ff(-1,a)}) = 1 âˆ’ ${ff(1,b)}.`,answer:`Expand: ${ff(a,b)}أ—${ff(b,a)} + ${ff(a,b)}أ—${ff(-1,a)} = 1 âˆ’ ${ff(1,b)}`}},
    ()=>{return{topic:'Insert rational numbers',text:`Insert 5 rational numbers between âˆ’1/2 and 1/2.`,answer:`âˆ’2/5, âˆ’1/5, 0, 1/5, 2/5 (multiply numerator and denominator by 6)`}},
    ()=>{const a=rng(2,5),b=rng(3,8);return{topic:'Complex expression',text:`Simplify: [${ff(a,b)} أ· ${ff(a,b+1)}] أ— [${ff(b+1,b)} âˆ’ 1].`,answer:`= ${ff(b+1,b)} أ— ${ff(1,b)} = ${ff(b+1,b*b)}`}},
    ()=>{return{topic:'Word problem â€“ multi-step',text:`A tank is ${ff(3,4)} full. After removing ${ff(1,6)} of its capacity, what fraction remains? If the tank holds 240 L, find the actual amount remaining.`,answer:`${ff(3,4)} âˆ’ ${ff(1,6)} = ${ff(7,12)}; Amount = ${ff(7,12)} أ— 240 = 140 L`}},
    ()=>{return{topic:'Rational number property',text:`Prove that between any two rational numbers there are infinitely many rational numbers.`,answer:`For any two rationals p/q and r/s, their average (ps+qr)/(2qs) is a rational between them; this process can be repeated infinitely.`}},
  ]
};

G_ICSE8['Exponents']={
  easy:[

function getGeneratorSet(){return currentCurriculum==='cbse9'?G_CBSE9:G_ICSE8}

function buildPool(chapters){
  const pool=[];
  const GG=getGeneratorSet();
  chapters.forEach(ch=>{
    const g=GG[ch];if(!g)return;
    const levels=[['easy',1],['moderate',2],['hard',3]];
    levels.forEach(([level,marks])=>{
      if(!g[level])return;
      const used=new Set();
      g[level].forEach((fn,i)=>{
        try{
          const q=fn();
          if(q&&q.text&&!used.has(q.text)){used.add(q.text);pool.push({chapter:ch,level,marks,topic:q.topic,text:q.text,answer:q.answer});}
        }catch(e){}
      });
    });
  });
  return pool;
}

function pickBalanced(pool,count,marks){
  const byChapter={};
  pool.filter(q=>q.marks===marks).forEach(q=>{(byChapter[q.chapter]=byChapter[q.chapter]||[]).push(q);});
  const chapters=Object.keys(byChapter);if(!chapters.length)return[];
  const result=[];let ci=0;
  while(result.length<count&&chapters.some(c=>byChapter[c].length>0)){
    const ch=chapters[ci%chapters.length];ci++;
    if(!byChapter[ch]||!byChapter[ch].length)continue;
    const idx=Math.floor(Math.random()*byChapter[ch].length);
    result.push(byChapter[ch].splice(idx,1)[0]);
  }
  return result;
}

function buildPaper(chapters){
  const pool=buildPool(chapters);
  const sections=[
    {name:'A',marks:1,count:10,label:'(1 mark each)'},
    {name:'B',marks:1,count:8, label:'(2 marks each)'},
    {name:'C',marks:2,count:7, label:'(3 marks each)'},
    {name:'D',marks:3,count:5, label:'(4 marks each)'},
  ];
  const paper={sections:[]};
  sections.forEach(s=>{
    const qs=pickBalanced(pool,s.count,s.marks);
    paper.sections.push({...s,questions:qs});
  });
  return paper;
}

 function renderPaper(paper, idx) {
  const isICSE = currentCurriculum === 'icse8';
  const classLabel = isICSE ? 'Class VIII' : 'Class IX';
  const boardLabel = isICSE ? 'ICSE' : 'CBSE';
  let qNum = 0;
  
  let html = `<div class="paper-doc" id="paper-${idx}">
    <div class="doc-header">
      <h2>${boardLabel} Mathematics Examination</h2>
      <h3>${classLabel} آ· Paper ${idx + 1}</h3>
    </div>
    <div class="doc-meta">
      <span>Time: 3 Hours</span>
      <span>Maximum Marks: 80</span>
    </div>
    <p style="font-size:12px;font-style:italic;margin-bottom:10px">
      <em>General Instructions: Attempt all questions. Show all working. Figures to the right indicate marks.</em>
    </p>`;

  paper.sections.forEach(s => {
    html += `<div class="section-head">Section ${s.name} ${s.label}</div>`;
    s.questions.forEach(q => {
      qNum++;
      
      // Sabhi ajeeb characters ki safai
      let cleanText = String(q.text)
        .replace(/''/g, '-') 
        .replace(/(\w|\d)"(\s*)(\w|\d)/g, '$1 - $3')
        .replace(/"/g, '')
        .replace(/(\d)x(\d)/g, '$1x$2')
        .trim();
      
      html += `<div class="q-row">
        <span class="q-num">${qNum}.</span>
        <span class="q-text">${cleanText}</span>
      </div>`;
    });
  });

  html += `<div class="ans-section" id="ans-${idx}" style="display:${showAnswers ? 'block' : 'none'}">
    <h4>Answer Key</h4>`;
  
  qNum = 0;
  paper.sections.forEach(s => {
    s.questions.forEach(q => {
      qNum++;
      let cleanAns = String(q.answer).replace(/''/g, '-').replace(/"/g, '');
      html += `<div class="ans-row"><span class="ans-num">${qNum}.</span><span class="ans-text">${cleanAns}</span></div>`;
    });
  });

  html += `</div></div>`;
  return html;
}
  

function generatePapers(){
  // 1. Selected chapters check karein
  const chapters = getSelectedChapters();
  if(!chapters.length){
    alert('Please select at least one chapter.');
    return;
  }

  // 2. Papers ki sankhya set karein (Max 5)
  const n = Math.min(5, Math.max(1, parseInt(document.getElementById('numPapers').value) || 1));
  
  // 3. Purane papers saaf karein aur naye generate karein
  generatedPapers = [];
  for(let i = 0; i < n; i++) {
    generatedPapers.push(buildPaper(chapters));
  }

  // 4. Default settings reset karein
  activePaperIndex = 0;
  showAnswers = false;

  // 5. UI Render karein (Tabs aur Paper dikhayein)
  renderAll();

  // 6. Mobile Optimization: Screen ko smooth scroll karke paper par le jayein
  if(window.innerWidth < 850) {
    const toolbar = document.getElementById('toolbar');
    if(toolbar) {
      toolbar.scrollIntoView({ behavior: 'smooth' });
    }
  }
}
  

function renderAll(){
  const tabs=document.getElementById('paperTabs');
  const area=document.getElementById('paperArea');
  if(!generatedPapers.length){tabs.style.display='none';area.innerHTML='<div class="empty-state"><div class="icon">ًں“„</div><h3>No papers generated yet</h3><p>Select chapters and click Generate Papers</p></div>';['ansBtn','dlBtn','printBtn'].forEach(id=>document.getElementById(id).style.display='none');return;}
  tabs.style.display='block';
  tabs.innerHTML=generatedPapers.map((_,i)=>`<span class="tab${i===activePaperIndex?' active':''}" onclick="switchTab(${i})">Paper ${i+1}</span>`).join('');
  area.innerHTML=renderPaper(generatedPapers[activePaperIndex],activePaperIndex);
  document.getElementById('ansBtn').style.display='inline-block';
  document.getElementById('ansBtn').textContent=showAnswers?'Hide Answers':'Show Answers';
  document.getElementById('dlBtn').style.display='inline-block';
  document.getElementById('printBtn').style.display='inline-block';
}

function switchTab(i){activePaperIndex=i;renderAll();}

function toggleAnswers(){
  showAnswers=!showAnswers;
  document.getElementById('ansBtn').textContent=showAnswers?'Hide Answers':'Show Answers';
  const el=document.getElementById(`ans-${activePaperIndex}`);
  if(el)el.style.display=showAnswers?'block':'none';
}

function switchCurriculum(){
  currentCurriculum=document.getElementById('curriculumSelect').value;
  const isCBSE=currentCurriculum==='cbse9';
  document.getElementById('sidebarSub').textContent=isCBSE?'CBSE Class 9 آ· NCERT Mathematics':'ICSE Class 8 آ· ML Aggarwal Mathematics';
  document.getElementById('sidebarFooter').innerHTML=isCBSE?'NCERT Class 9 آ· Dynamically generated<br/>No two papers are ever the same.':'ML Aggarwal Class 8 آ· Dynamically generated<br/>No two papers are ever the same.';
  generatedPapers=[];activePaperIndex=0;showAnswers=false;
  buildChapterList();
  document.getElementById('paperTabs').style.display='none';
  document.getElementById('paperArea').innerHTML='<div class="empty-state"><div class="icon">ًں“„</div><h3>No papers generated yet</h3><p>Select chapters and click Generate Papers</p></div>';
  ['ansBtn','dlBtn','printBtn'].forEach(id=>document.getElementById(id).style.display='none');
}

function buildChapterList(){
  const chapters=getCurrentChapters();
  const cl=document.getElementById('chapterList');
  cl.innerHTML=chapters.map((ch,i)=>`<label class="ch-item"><input type="checkbox" id="ch-${i}" value="${ch}" checked/><span>${ch}</span></label>`).join('');
}

function getSelectedChapters(){
  return getCurrentChapters().filter((_,i)=>{const el=document.getElementById(`ch-${i}`);return el&&el.checked;});
}

function selAll(){getCurrentChapters().forEach((_,i)=>{const el=document.getElementById(`ch-${i}`);if(el)el.checked=true;});}
function selNone(){getCurrentChapters().forEach((_,i)=>{const el=document.getElementById(`ch-${i}`);if(el)el.checked=false;});}

function downloadPDF(){
  if(!generatedPapers.length) return;
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  
  const isICSE = currentCurriculum === 'icse8';
  const classLabel = isICSE ? 'Class VIII' : 'Class IX';
  const boardLabel = isICSE ? 'ICSE' : 'CBSE';
  const paper = generatedPapers[activePaperIndex];
  
  let y = 20; 
  const margin = 20;
  const pageWidth = 210;
  const contentWidth = pageWidth - (margin * 2);

  // --- Header ---
  doc.setFont("times", "bold");
  doc.setFontSize(16);
  doc.text(`${boardLabel} MATHEMATICS EXAMINATION`, pageWidth / 2, y, {align: 'center'});
  y += 8;
  doc.setFontSize(12);
  doc.text(`${classLabel} آ· PAPER ${activePaperIndex + 1}`, pageWidth / 2, y, {align: 'center'});
  y += 10;

  // --- Exam Info ---
  doc.setFontSize(10);
  doc.text(`Time: 3 Hours`, margin, y);
  doc.text(`Maximum Marks: 80`, pageWidth - margin, y, {align: 'right'});
  y += 4;
  doc.setLineWidth(0.5);
  doc.line(margin, y, pageWidth - margin, y);
  y += 10;

  // --- Questions ---
  let qNum = 0;
  paper.sections.forEach(s => {
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text(`Section ${s.name} ${s.label}`, margin, y);
    y += 8;

    doc.setFont("times", "normal");
    doc.setFontSize(11);

    s.questions.forEach(q => {
      qNum++;
      
      // â”€â”€â”€ MASTER SAFAI + SPACING FIX (PDF) â”€â”€â”€
let qText = String(q.text || "");
let cleanText = qText
  .replace(/[آ±خ±]/g, 'alpha')           // 1. Pehle Alpha ko badlo
  .replace(/âˆڑ\s*/g, 'sqrt ')          // 2. Root symbol handle karo
  .replace(/''/g, ' - ')               // 3. Double single quotes ko minus banao
  .replace(/(\w|\d)\s*"\s*(\w|\d)/g, '$1 - $2') // 4. Beech wale quote ko minus banao (Q.6, 13, 16 fix)
  .replace(/(\d)\s*"\s*(\d)/g, '$1 - $2')       // 5. Numbers ke beech ka quote fix (Extra safety)
  .replace(/"/g, '')                   // 6. Ab jo faltu quotes bache unhe hatao
  .replace(/\s+/g, ' ')                // 7. Extra spacing saaf karo
  .trim();

      const qLine = `${qNum}. ${cleanText}`;
      const splitQ = doc.splitTextToSize(qLine, contentWidth);
      const qHeight = splitQ.length * 7; 

      if (y + qHeight > 280) { doc.addPage(); y = 20; }
      doc.text(splitQ, margin, y);
      y += qHeight + 2; 
    });
    y += 6; 
  });

  // --- Answer Key ---
  if(showAnswers){
    doc.addPage();
    y = 20;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text('ANSWER KEY', pageWidth / 2, y, {align: 'center'});
    y += 12;
    doc.setFont("times", "normal");
    doc.setFontSize(10);
    let aNum = 0;
    paper.sections.forEach(s => {
      s.questions.forEach(q => {
        aNum++;
        let aText = String(q.answer || "");
        let cleanAns = aText.replace(/''/g, '-').replace(/"/g, '');
        const aLine = `${aNum}. ${cleanAns}`;
        const splitA = doc.splitTextToSize(aLine, contentWidth);
        const aHeight = splitA.length * 5;
        if (y + aHeight > 280) { doc.addPage(); y = 20; }
        doc.text(splitA, margin, y);
        y += aHeight + 2;
      });
    });
  }

  doc.save(`${boardLabel}_${classLabel.replace(' ','')}_Paper${activePaperIndex+1}.pdf`);
}

buildChapterList();
